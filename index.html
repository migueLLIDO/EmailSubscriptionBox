<!DOCTYPE html>
<html lang="pt-br">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content=" Forms, HTML, CSS">
    <meta name="description" content=" Formulario de inscrição em HTML e CSS.">
    <meta name="author" content="Miguel Oliveira">
    <meta name="robots" content="index,follow">
    <meta name="X-UA-Compatible" content="IE=7">
    <link rel="shortcut icon" href="img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
    <title>Formulario de inscrição</title>
</head>
<body>
  <div class="wrapper">
    <div class="top">
      <i class="fas fa-envelope-open-text"></i>
    </div>
    <div class="bottom">
      <div class="info">
        Subscribe to our channel and<br>get the latest updates
      </div>
      <form action="#">
        <div class="input-box">
          <input type="text" placeholder="Enter your email" required>
        </div>
        <div class="input-box">
          <input type="submit" value="Subscribe">
        </div>
      </form>
      <div class="footer">
        Don't worry, we don't spam
      </div>
    </div>
  </div>
</body>
</html>
